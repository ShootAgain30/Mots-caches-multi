<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mots cachés</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, sans-serif;
      margin: 0; padding: 0;
      background: #f0f0f0;
      color: #222;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    header { padding: 10px 16px; text-align: center; }
    h1 { margin: 0; font-size: 1.3rem; }
    #theme-label { font-size: 12px; color: #888; margin-top: 2px; }
    #game {
      width: 100%;
      max-width: 440px;
      padding: 4px 10px 24px;
    }
    #grid-wrap { margin: 6px auto; }
    #grid-canvas { display: block; touch-action: none; }
    #score { text-align: center; font-size: 13px; color: #555; margin: 4px 0; }
    #word-list {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      font-size: 12px;
      margin-top: 6px;
    }
    .word-item {
      padding: 3px 7px;
      border-radius: 4px;
      background: #fff;
      border: 1px solid #ccc;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    .word-item.found {
      text-decoration: line-through;
      background: #b5f5b5;
      border-color: #3c9c3c;
      color: #104010;
    }
    #mystery-zone {
      display: none;
      margin-top: 14px;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    #mystery-zone.visible { display: flex; }
    #mystery-hint {
      font-size: 12px;
      color: #888;
      font-style: italic;
      text-align: center;
    }
    #mystery-input-row {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    #mystery-input {
      padding: 7px 10px;
      border: 2px solid #4a90e2;
      border-radius: 6px;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      width: 180px;
      outline: none;
      text-align: center;
    }
    #mystery-input.error {
      border-color: #e24a4a;
      background: #fff0f0;
      animation: shake 0.3s ease;
    }
    @keyframes shake {
      0%,100%{transform:translateX(0)}
      25%{transform:translateX(-6px)}
      75%{transform:translateX(6px)}
    }
    #mystery-submit {
      padding: 7px 14px;
      border-radius: 6px;
      border: none;
      background: #4a90e2;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    #mystery-submit:active { transform: scale(0.97); }
    #mystery-result {
      font-size: 1rem;
      font-weight: 700;
      text-align: center;
      min-height: 1.4em;
    }

    #mystery-result.fail { color: #c00; }
    #controls { margin-top: 12px; display: flex; justify-content: center; }
    button.main-btn {

      border-radius: 6px;
      border: none;
      background: #4a90e2;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 2px 4px rgba(0,0,0,.2);
    }
    button.main-btn:active { transform: scale(0.97); }
  </style>
</head>
<body>
  <header>
    <h1>🔍 Mots cachés</h1>
    <div id="theme-label"></div>
  </header>
  <main id="game">

    <div id="score"></div>
    <div id="word-list"></div>

      <div id="mystery-input-row">
        <input id="mystery-input" type="text" maxlength="20" placeholder="MOT MYSTÈRE"
               autocomplete="off" autocorrect="off" spellcheck="false" />
        <button id="mystery-submit">OK</button>
      </div>
      <div id="mystery-result"></div>
    </div>
    <div id="controls">
      <button class="main-btn" id="new-game">Nouvelle grille</button>
    </div>
  </main>

// ═══════════════════════════════════════════════════════

  corps:      ["BRAS","JAMBE","TETE","COEUR","FOIE","REIN","POUMON","GENOU","COUDE","EPAULE","CHEVILLE","POIGNET","NUQUE","MENTON","TEMPE","NARINE","PAUME","TALON","STERNUM","CLAVICULE","TIBIA","HANCHE","ROTULE","SACRUM","COCCYX","FEMUR","RADIUS","CUBITUS","PHALANGE","MALLEOLE","TRACHEE","OESOPHAGE","ESTOMAC","INTESTIN","PANCREAS","RATE","THYROIDE","HYPOPHYSE","AMYGDALE","APPENDICE","PERITOINE","DIAPHRAGME","TYMPAN","RETINE","CORNÉE","CRISTALLIN","COCHLEE","MANDIBULE","MAXILLAIRE","VERTEBRE","CARTILAGE","LIGAMENT","TENDON","AORTE","ARTERE","VEINE","CAPILLAIRE","NEURONE","SYNAPSE","CHROMOSOME"],
  musique:    ["GUITARE","PIANO","VIOLON","TROMPETTE","FLUTE","HARPE","ACCORDEON","TUBA","HAUTBOIS","CLARINETTE","BASSON","TROMBONE","CORNET","BUGLE","LUTH","MANDOLINE","BANJO","UKULELE","BALALAIKA","SITAR","TABLA","DJEMBE","CONGAS","MARACAS","CASTAGNETTES","XYLOPHONE","VIBRAPHONE","MARIMBA","GLOCKENSPIEL","CARILLON","CLAVECIN","ORGUE","HARMONIUM","THEREMIN","SYNTHESEUR","CONTREBASSE","VIOLONCELLE","ALTO","PICCOLO","FLAGEOLET","OCARINA","CORNEMUSE","MUSETTE","DULCIMER","CITHARE","VIELLE","REBEC","LIRONE","THEORBE","ARCHILUTH","SANZA","KORA","BALAFON","MBIRA","STEELDRUM","GAMELAN","TAIKO","BODHRAN","BODHRÁN","BOUZOUKI"],
  cuisine:    ["SOUPE","SALADE","GRATIN","RAGOUT","RISOTTO","PAELLA","TAJINE","COUSCOUS","LASAGNE","RAVIOLI","GNOCCHI","POLENTA","RISOTTO","FONDUE","RACLETTE","QUICHE","TARTE","CLAFOUTIS","COMPOTE","COULIS","SORBET","MOUSSE","PARFAIT","SOUFFLÉ","MERINGUE","MACARON","ÉCLAIR","MADELEINE","BEIGNET","CREPE","GALETTE","BRIOCHE","CROISSANT","BAGUETTE","FOCACCIA","CIABATTA","CHAPATI","NAAN","PITA","TORTILLA","EMPANADA","TAMALE","SUSHI","TEMPURA","RAMEN","POKE","BIBIMBAP","KIMCHI","MISO","DASHI","SHAKSHUKA","HUMMUS","TABOULÉ","FATTOUSH","BABA","HALVA","BAKLAVA","LOUKOUM","TIRAMISU","PANNA"],
  transports: ["VOITURE","AVION","TRAIN","BATEAU","VELO","MOTO","BUS","METRO","TRAMWAY","TAXI","FERRY","CARGO","TANKER","SUBMARINE","HELICOPTER","PLANEUR","DIRIGEABLE","NAVETTE","FUSEE","SATELLITE","TRACTEUR","CAMION","AMBULANCE","POMPIER","BLINDÉ","CHAR","DESTROYER","FRÉGATE","CORVETTE","CUIRASSE","PORTE-AVION","CATAMARAN","TRIMARAN","KAYAK","PIROGUE","JONQUE","GALION","GALERE","CARAVELLE","GOELETTE","CLIPPER","VAPEUR","REMORQUEUR","CHALUTIER","PAQUEBOT","HOVERCRAFT","HYDROFOIL","SKIDOO","QUAD","SEGWAY","TROTTINETTE","PATINETTE","CHARIOT","BROUETTE","DILIGENCE","CALÈCHE","LANDAU","SULKY","TRAÎNEAU"],
  informatique: ["ORDINATEUR","CLAVIER","SOURIS","ECRAN","SERVEUR","RESEAU","INTERNET","LOGICIEL","PROGRAMME","ALGORITHME","VARIABLE","FONCTION","BOUCLE","TABLEAU","OBJET","CLASSE","METHODE","MODULE","LIBRAIRIE","FRAMEWORK","INTERFACE","PROTOCOLE","NAVIGATEUR","MOTEUR","BASE","REQUETE","INDEX","JOINTURE","TRANSACTION","CRYPTAGE","CERTIFICAT","PARE-FEU","ANTIVIRUS","PROXY","ROUTEUR","COMMUTATEUR","MODEM","FIBRE","BLUETOOTH","SATELLITE","PROCESSEUR","MEMOIRE","STOCKAGE","DISQUE","PARTITION","SYSTEME","NOYAU","PILOTE","DAEMON","PROCESSUS","THREAD","SOCKET","PORT","PAQUET","TRAME","SIGNAL","BIT","OCTET","PIXEL","VECTEUR"],
  géographie: ["EQUATEUR","TROPIQUE","MERIDIEN","LATITUDE","LONGITUDE","ALTITUDE","RELIEF","EROSION","SEDIMENT","ALLUVION","TECTONIQUE","SUBDUCTION","OROGENIE","GLACIATION","PERMAFROST","MORAINE","CIRQUE","CREVASSE","SÉRACS","NÉVÉ","KARST","DOLINE","POLJE","ABYME","TALWEG","VERSANT","INTERFLUVE","BASSIN","CONFLUENCE","MEANDRE","BRAS","BIEF","ECLUSE","BARRAGE","RETENUE","NAPPE","SOURCE","RESURGENCE","AQUIFERE","ISOHYETE","ISOBARE","ISOTHERME","ANTICYCLONE","DEPRESSION","FRONT","THALWEG","ZENITH","NADIR","SOLSTICE","EQUINOXE","APOGEE","PERIGEE","PERIHELIE","APHELIE","TRANSIT","ECLIPSE","AUREOLE","COURONNE","CHROMOSPHERE"],
};

// J'enlève PATIN de sports — il est inclus dans PATINAGE
// Règle générale : on filtre les mots qui sont sous-chaînes d'autres mots du même thème
function filterSubwords(words) {
  return words.filter(w =>
    !words.some(other => other !== w && other.includes(w))
  );
}

const DIRECTIONS = [
  {dr:0,dc:1},{dr:0,dc:-1},{dr:1,dc:0},{dr:-1,dc:0},
  {dr:1,dc:1},{dr:1,dc:-1},{dr:-1,dc:1},{dr:-1,dc:-1},
];

// ═══════════════════════════════════════════════════════
//  UTILITAIRES
// ═══════════════════════════════════════════════════════
const randInt = n => Math.floor(Math.random() * n);
const choice  = a => a[randInt(a.length)];
function shuffle(a) {
  a = [...a];
  for (let i = a.length-1; i > 0; i--) {
    const j = randInt(i+1); [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

// Clé de case pour Set
const key = (r,c) => r*100+c;

// ═══════════════════════════════════════════════════════
//  GÉNÉRATION
// ═══════════════════════════════════════════════════════
function makeGrid(n) { return Array.from({length:n}, () => Array(n).fill(null)); }
function makeUsed(n) { return Array.from({length:n}, () => Array(n).fill(false)); }

function canPlace(grid, word, r0, c0, dir) {
  const n = grid.length;
  for (let i = 0; i < word.length; i++) {
    const r = r0+dir.dr*i, c = c0+dir.dc*i;
    if (r<0||r>=n||c<0||c>=n) return false;
    if (grid[r][c] !== null && grid[r][c] !== word[i]) return false;
  }
  return true;
}

function doPlace(grid, word, r0, c0, dir) {
  for (let i = 0; i < word.length; i++)
    grid[r0+dir.dr*i][c0+dir.dc*i] = word[i];
}

// Retourne les cases occupées par ce placement, ou null si impossible
function tryPlaceWord(grid, word) {
  const n = grid.length;
  const dirs = shuffle(DIRECTIONS);
  const rows = shuffle([...Array(n).keys()]);
  for (const r0 of rows) {
    const cols = shuffle([...Array(n).keys()]);
    for (const c0 of cols) {
      for (const dir of dirs) {
        if (canPlace(grid, word, r0, c0, dir)) {
          // Retourner les cases que ce mot occupe en EXCLUSIVITÉ (nouvelles cases)
          const cells = [];
          for (let i = 0; i < word.length; i++) {
            const r = r0+dir.dr*i, c = c0+dir.dc*i;
            cells.push([r, c]);
          }
          doPlace(grid, word, r0, c0, dir);
          return cells; // liste des cases (y compris partagées)
        }
      }
    }
  }
  return null;
}

function countFree(grid) {
  let n = 0;
  for (let r=0; r<grid.length; r++)
    for (let c=0; c<grid[r].length; c++)
      if (grid[r][c] === null) n++;
  return n;
}

function freeCellsInOrder(grid) {
  const cells = [];
  for (let r=0; r<grid.length; r++)
    for (let c=0; c<grid[r].length; c++)
      if (grid[r][c] === null) cells.push([r,c]);
  return cells;
}

function generateGame(depth=0) {
  if (depth > 500) return null;

  const grid = makeGrid(GRID_SIZE);
  const themeName = choice(Object.keys(THEMES));

  // Filtrer les sous-mots ET trier du plus long au plus court
  const pool = filterSubwords(
    shuffle(THEMES[themeName]).filter(w => w.length >= 3 && w.length <= GRID_SIZE)
  ).sort((a,b) => b.length - a.length);

  // wordCells[i] = Set des clés de cases exclusives à ce mot
  const placed     = []; // mots retenus
  const wordCells  = []; // cases de chaque mot retenu

  // coverCount[key] = nombre de mots qui couvrent cette case
  const coverCount = {};

  for (const word of pool) {
    const testGrid = grid.map(r => [...r]);
    const cells = tryPlaceWord(testGrid, word);
    if (!cells) continue;

    // Compter combien de cases de ce mot sont DÉJÀ couvertes par d'autres mots
    const newCells    = [];
    const sharedCells = [];
    for (const [r,c] of cells) {
      if (coverCount[key(r,c)]) sharedCells.push([r,c]);
      else newCells.push([r,c]);
    }

    // Refuser si le mot n'apporte AUCUNE case nouvelle (doublon complet)
    if (newCells.length === 0) continue;

    // Appliquer
    for (let r=0; r<GRID_SIZE; r++)
      for (let c=0; c<GRID_SIZE; c++)
        grid[r][c] = testGrid[r][c];

    for (const [r,c] of cells) {
      coverCount[key(r,c)] = (coverCount[key(r,c)] || 0) + 1;
    }

    placed.push(word);
    wordCells.push(cells);

    // Après 6 mots min, vérifier si les cases libres = longueur d'un secret
    if (placed.length >= 6) {
      const free = countFree(grid);
      if (SECRET_LENGTHS.has(free)) {

        // Vérifier qu'il n'y a aucune case couverte par 0 mot visible
        // (case orpheline = bug de partage)
        let orphan = false;
        for (let r=0; r<GRID_SIZE; r++) {
          for (let c=0; c<GRID_SIZE; c++) {
            if (grid[r][c] !== null && !coverCount[key(r,c)]) {
              orphan = true; break;
            }
          }
          if (orphan) break;
        }
        if (orphan) continue;

        const secret = choice(SECRETS_BY_LEN[free]);
        const freeCells = freeCellsInOrder(grid);

        // Placer le secret dans les cases libres (ordre lecture)
        for (let i = 0; i < secret.length; i++) {
          const [r,c] = freeCells[i];
          grid[r][c] = secret[i];
        }

        // Remplissage résiduel (ne devrait pas arriver)
        const alpha = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        for (let r=0; r<GRID_SIZE; r++)
          for (let c=0; c<GRID_SIZE; c++)
            if (grid[r][c] === null) grid[r][c] = alpha[randInt(alpha.length)];

        return {
          grid,
          words:       placed,
          wordCells,
          hiddenWord:  secret,
          secretCells: freeCells,
          theme:       themeName,
        };
      }
    }
  }

  return generateGame(depth + 1);
}

// ═══════════════════════════════════════════════════════
//  CANVAS
// ═══════════════════════════════════════════════════════
const canvas = document.getElementById("grid-canvas");
const ctx    = canvas.getContext("2d");

let game          = null;
let foundWords    = new Set();
let usedCells     = [];   // cases colorées en vert (mots trouvés)
let selCells      = [];
let dragging      = false;
let allFound      = false;
let gameWon       = false;

function initCanvas() {
  const size = CELL * GRID_SIZE;
  canvas.width = canvas.height = size;
  document.getElementById("grid-wrap").style.width = size + "px";
}

function cellStyle(r, c) {
  const isSel    = selCells.some(s => s.r===r && s.c===c);
  const isUsed   = usedCells[r][c];
  const isSecret = allFound && game.secretCells.some(([sr,sc]) => sr===r && sc===c);

  if (isSel)    return { bg:"#cde4ff", border:"#4a90e2", text:"#222" };
  if (isSecret) return { bg:"#ffe566", border:"#ccaa00", text:"#443300" };
  if (isUsed)   return { bg:"#b5f5b5", border:"#3c9c3c", text:"#104010" };
  return           { bg:"#ffffff",  border:"#cccccc",  text:"#222222" };
}

function drawGrid() {
  if (!game) return;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (let r=0; r<GRID_SIZE; r++) {
    for (let c=0; c<GRID_SIZE; c++) {
      const x=c*CELL, y=r*CELL;
      const {bg, border, text} = cellStyle(r, c);
      ctx.fillStyle = bg;
      ctx.beginPath();
      ctx.roundRect(x+1, y+1, CELL-2, CELL-2, 3);
      ctx.fill();
      ctx.strokeStyle = border;
      ctx.lineWidth = bg==="#ffffff" ? 0.7 : 1.5;
      ctx.stroke();
      ctx.fillStyle = text;
      ctx.font = `bold ${Math.round(CELL*0.48)}px system-ui`;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(game.grid[r][c], x+CELL/2, y+CELL/2);
    }
  }
}

// ═══════════════════════════════════════════════════════
//  SÉLECTION
// ═══════════════════════════════════════════════════════
function pointToCell(cx, cy) {
  const rect = canvas.getBoundingClientRect();
  const sx = canvas.width/rect.width, sy = canvas.height/rect.height;
  const x = (cx-rect.left)*sx, y = (cy-rect.top)*sy;
  const c = Math.floor(x/CELL), r = Math.floor(y/CELL);
  if (r<0||r>=GRID_SIZE||c<0||c>=GRID_SIZE) return null;
  return {r, c};
}

function buildLine(from, to) {
  const dr=to.r-from.r, dc=to.c-from.c;
  const adr=Math.abs(dr), adc=Math.abs(dc);
  if (adr!==0 && adc!==0 && adr!==adc) return null;
  const steps=Math.max(adr,adc);
  const sdr=Math.sign(dr), sdc=Math.sign(dc);
  const line=[];
  for (let i=0; i<=steps; i++) line.push({r:from.r+sdr*i, c:from.c+sdc*i});
  return line;
}

function onStart(cx, cy) {
  if (allFound) return;
  const cell = pointToCell(cx, cy); if (!cell) return;
  dragging=true; selCells=[cell]; drawGrid();
}
function onMove(cx, cy) {
  if (!dragging) return;
  const cell = pointToCell(cx, cy); if (!cell) return;
  const line = buildLine(selCells[0], cell);
  if (!line) return;
  selCells = line; drawGrid();
}
function onEnd() {
  if (!dragging) return;
  dragging = false;
  if (selCells.length >= 2) {
    const word    = selCells.map(s => game.grid[s.r][s.c]).join("");
    const wordRev = word.split("").reverse().join("");
    const match   = game.words.find(w => w===word || w===wordRev);
    if (match && !foundWords.has(match)) {
      foundWords.add(match);
      selCells.forEach(s => { usedCells[s.r][s.c] = true; });
      markWordFound(match);
      updateScore();
      if (foundWords.size === game.words.length) onAllFound();
    }
  }
  selCells = []; drawGrid();
}

function onAllFound() {
  allFound = true;
  drawGrid();
  document.getElementById("mystery-zone").classList.add("visible");
  document.getElementById("mystery-input").focus();
}

// Touch
canvas.addEventListener("touchstart",  e=>{e.preventDefault();onStart(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
canvas.addEventListener("touchmove",   e=>{e.preventDefault();onMove(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
canvas.addEventListener("touchend",    e=>{e.preventDefault();onEnd();},{passive:false});
canvas.addEventListener("touchcancel", e=>{e.preventDefault();selCells=[];dragging=false;drawGrid();},{passive:false});
// Souris
canvas.addEventListener("pointerdown", e=>{if(e.pointerType==="touch")return;onStart(e.clientX,e.clientY);});
canvas.addEventListener("pointermove", e=>{if(e.pointerType==="touch")return;onMove(e.clientX,e.clientY);});
window.addEventListener("pointerup",   e=>{if(e.pointerType==="touch")return;onEnd();});

// ═══════════════════════════════════════════════════════
//  SAISIE DU MOT MYSTÈRE
// ═══════════════════════════════════════════════════════
const mysteryInput  = document.getElementById("mystery-input");
const mysteryResult = document.getElementById("mystery-result");

function checkMystery() {
  const val = mysteryInput.value.trim().toUpperCase().replace(/\s/g,"");
  if (!val) return;
  if (val === game.hiddenWord) {
    gameWon = true;
    mysteryResult.textContent = "🏆 Bravo ! Tu as gagné !";
    mysteryResult.className = "win";
    mysteryInput.disabled = true;
    document.getElementById("mystery-submit").disabled = true;
  } else {
    mysteryInput.classList.remove("error");
    void mysteryInput.offsetWidth;
    mysteryInput.classList.add("error");
    mysteryResult.textContent = "❌ Ce n'est pas le bon mot, réessaie !";
    mysteryResult.className = "fail";
    mysteryInput.value = "";
    setTimeout(() => mysteryInput.classList.remove("error"), 400);
  }
}

document.getElementById("mystery-submit").addEventListener("click", checkMystery);
mysteryInput.addEventListener("keydown", e => { if (e.key==="Enter") checkMystery(); });
mysteryInput.addEventListener("input", () => {
  const pos = mysteryInput.selectionStart;
  mysteryInput.value = mysteryInput.value.toUpperCase();
  mysteryInput.setSelectionRange(pos, pos);
});

// ═══════════════════════════════════════════════════════
//  UI
// ═══════════════════════════════════════════════════════
function renderWordList(words) {
  const el = document.getElementById("word-list");
  el.innerHTML = "";
  [...words].sort().forEach(w => {
    const s = document.createElement("span");
    s.className="word-item"; s.textContent=w; s.dataset.word=w;
    el.appendChild(s);
  });
}
function markWordFound(word) {
  document.querySelectorAll(".word-item").forEach(el => {
    if (el.dataset.word===word) el.classList.add("found");
  });
}
function updateScore() {
  document.getElementById("score").textContent =
    `${foundWords.size} / ${game.words.length} mots trouvés`;
}

// ═══════════════════════════════════════════════════════
//  NOUVELLE PARTIE
// ═══════════════════════════════════════════════════════
function newGame() {
  allFound = false; gameWon = false;
  foundWords = new Set();
  usedCells  = makeUsed(GRID_SIZE);
  selCells   = []; dragging = false;

  document.getElementById("mystery-zone").classList.remove("visible");
  mysteryInput.value = "";
  mysteryInput.disabled = false;
  mysteryResult.textContent = "";
  mysteryResult.className = "";
  document.getElementById("mystery-submit").disabled = false;

  game = generateGame();
  if (!game) { setTimeout(newGame, 50); return; }

  document.getElementById("theme-label").textContent = "Thème : " + game.theme;
  renderWordList(game.words);
  updateScore();
  drawGrid();
}

document.getElementById("new-game").addEventListener("click", newGame);
initCanvas();
newGame();
</script>

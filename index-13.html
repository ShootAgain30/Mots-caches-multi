<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mots cachés</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, sans-serif;
      margin: 0; padding: 0;
      background: #f4f4f4;
      color: #222;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }
    header { padding: 10px 16px; text-align: center; }
    h1 { margin: 0; font-size: 1.3rem; }
    #theme-label { font-size: 12px; color: #777; margin-top: 2px; }
    #game {
      width: 100%;
      max-width: 440px;
      padding: 4px 12px 24px;
    }
    #grid-wrap { margin: 8px auto; }
    #grid-canvas { display: block; touch-action: none; }
    #score { text-align: center; font-size: 13px; color: #555; margin-top: 4px; }
    #word-list {
      margin-top: 8px;
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      font-size: 12px;
    }
    .word-item {
      padding: 2px 6px;
      border-radius: 4px;
      background: #fff;
      border: 1px solid #ccc;
    }
    .word-item.found {
      text-decoration: line-through;
      background: #b5f5b5;
      border-color: #3c9c3c;
      color: #104010;
    }
    #hidden-word {
      margin-top: 12px;
      font-weight: 700;
      text-align: center;
      min-height: 1.4em;
      font-size: 1rem;
      color: #c00;
    }
    #controls { margin-top: 10px; display: flex; justify-content: center; }
    button {
      padding: 7px 18px;
      border-radius: 4px;
      border: 1px solid #4a90e2;
      background: #4a90e2;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
    }
    button:active { transform: scale(0.97); }
  </style>
</head>
<body>
  <header>
    <h1>🔍 Mots cachés</h1>
    <div id="theme-label"></div>
  </header>
  <main id="game">
    <div id="grid-wrap"><canvas id="grid-canvas"></canvas></div>
    <div id="score"></div>
    <div id="word-list"></div>
    <div id="hidden-word"></div>
    <div id="controls"><button id="new-game">Nouvelle grille</button></div>
  </main>

<script>
// ═══════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════
const GRID_SIZE = 12;
const TOTAL     = GRID_SIZE * GRID_SIZE; // 144 cases

// Taille d'une cellule adaptée à l'écran
const CELL = Math.min(30, Math.floor((Math.min(window.innerWidth, 440) - 24) / GRID_SIZE));

// ═══════════════════════════════════════════
//  BANQUE DE MOTS
// ═══════════════════════════════════════════
const THEMES = {
  animaux:  ["CHAT","LION","TIGRE","OURS","RENARD","LOUP","AIGLE","REQUIN","DAUPHIN","VACHE","CHEVAL","COCHON","LAPIN","SERPENT","SINGE","PERROQUET","MOUTON","HIBOU","PANDA","ZEBRE","BALEINE","TORTUE","AUTRUCHE","KANGOUROU","KOALA","PUMA","LYNX","BISON","PHOQUE","MORSE"],
  fruits:   ["POMME","BANANE","KIWI","RAISIN","MANGUE","FRAISE","CERISE","ANANAS","PECHE","POIRE","CITRON","ORANGE","PRUNE","MELON","FRAMBOISE","ABRICOT","FIGUE","PAPAYE","GOYAVE","COCO","GRENADE","LITCHI","NECTARINE","CARAMBOLE","DURIAN","KUMQUAT","MYRTILLE","MURE","BRUGNON","DATTE"],
  sports:   ["FOOT","RUGBY","TENNIS","NATATION","CYCLISME","BOXE","GOLF","BASKET","VOLLEY","HANDBALL","JUDO","KARATE","ESCRIME","AVIRON","SURF","SKI","PATINAGE","LUTTE","TRIATHLON","PLONGEON","EQUITATION","ESCALADE","BIATHLON","BOBSLEIGH","LUGE","CURLING","FLEURET","SABRE","EPEE","PATIN"],
  pays:     ["FRANCE","ESPAGNE","ITALIE","JAPON","CHINE","BRESIL","CANADA","MEXIQUE","INDE","RUSSIE","TURQUIE","EGYPTE","MAROC","ALGERIE","GHANA","IRAN","PEROU","CUBA","CHILI","SUEDE","NORVEGE","FINLANDE","POLOGNE","HONGRIE","AUTRICHE","BELGIQUE","SUISSE","PORTUGAL","GRECE","SERBIE"],
  couleurs: ["ROUGE","BLEU","VERT","JAUNE","ORANGE","VIOLET","ROSE","GRIS","BLANC","NOIR","BEIGE","CYAN","INDIGO","MARRON","CORAIL","AZUR","OCRE","LILAS","TURQUOISE","ECARLATE","CRAMOISI","EMERAUDE","SAPHIR","RUBIS","AMBRE","IVOIRE","ACIER","BRIQUE","SABLE","OLIVE"],
  metiers:  ["MEDECIN","PILOTE","POMPIER","CUISINIER","AVOCAT","JUGE","ACTEUR","DANSEUR","CHANTEUR","PEINTRE","SCULPTEUR","INGENIEUR","ARCHITECTE","INFIRMIER","PHARMACIEN","LIBRAIRE","MENUISIER","PLOMBIER","COIFFEUR","JARDINIER","BOUCHER","BOULANGER","POISSONNIER","ELECTRICIEN","MACONNERIE","CHARPENTIER","VITRIER","SERRURIER","CARRELEUR","PEINTURE"],
  nature:   ["FORET","OCEAN","RIVIERE","MONTAGNE","DESERT","PRAIRIE","VOLCAN","GLACIER","FALAISE","LAGUNE","CANYON","DELTA","TOUNDRA","SAVANE","MARAIS","COLLINE","VALLEE","PLATEAU","DUNE","GROTTE","TORRENT","ESTUAIRE","PRESQULE","ARCHIPEL","ATOLL","FJORD","STEPPE","PAMPA","MAQUIS","LANDE"],
  corps:    ["BRAS","JAMBE","TETE","COEUR","FOIE","REIN","POUMON","GENOU","COUDE","EPAULE","CHEVILLE","POIGNET","NUQUE","MENTON","TEMPE","NARINE","PAUME","TALON","STERNUM","CLAVICULE","TIBIA","PERONE","HANCHE","ROTULE","OMOPLTE","SACRUM","COCCYX","FEMUR","RADIUS","CUBITUS"],
};

// Mots secrets indexés par longueur exacte
const SECRETS = {
   6: ["BRAVO","SUPER","GENIAL","VICTOIRE"],
   7: ["PARFAIT","CHAPEAU","GAGNANT"],
   8: ["EXCELLENT","FANTASTI","CHAMPION"],
   9: ["MERVEILLE","TRIOMPHE"],
  10: ["FELICITATS","PRODIGIEUX"],
  12: ["EXTRAORDINAR","FORMIDABLEJEU"],
};

const DIRECTIONS = [
  {dr:0,dc:1},{dr:0,dc:-1},{dr:1,dc:0},{dr:-1,dc:0},
  {dr:1,dc:1},{dr:1,dc:-1},{dr:-1,dc:1},{dr:-1,dc:-1},
];

// ═══════════════════════════════════════════
//  UTILITAIRES
// ═══════════════════════════════════════════
const randInt = n => Math.floor(Math.random() * n);
const choice  = a => a[randInt(a.length)];
function shuffle(a) {
  a = [...a];
  for (let i = a.length-1; i > 0; i--) {
    const j = randInt(i+1); [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

// ═══════════════════════════════════════════
//  GÉNÉRATION : couverture totale
// ═══════════════════════════════════════════
function makeGrid(n) { return Array.from({length:n}, ()=>Array(n).fill(null)); }
function makeUsed(n) { return Array.from({length:n}, ()=>Array(n).fill(false)); }

function canPlace(grid, word, r0, c0, dir) {
  const n = grid.length;
  for (let i = 0; i < word.length; i++) {
    const r = r0+dir.dr*i, c = c0+dir.dc*i;
    if (r<0||r>=n||c<0||c>=n) return false;
    if (grid[r][c] !== null && grid[r][c] !== word[i]) return false;
  }
  return true;
}

function doPlace(grid, used, word, r0, c0, dir) {
  for (let i = 0; i < word.length; i++) {
    const r = r0+dir.dr*i, c = c0+dir.dc*i;
    grid[r][c] = word[i]; used[r][c] = true;
  }
}

function tryPlace(grid, used, word) {
  const n = grid.length;
  const dirs = shuffle(DIRECTIONS);
  // On tente les positions aléatoires
  const positions = [];
  for (let r=0;r<n;r++) for (let c=0;c<n;c++) positions.push([r,c]);
  const pos = shuffle(positions);
  for (const [r0,c0] of pos) {
    for (const dir of dirs) {
      if (canPlace(grid, word, r0, c0, dir)) {
        doPlace(grid, used, word, r0, c0, dir);
        return true;
      }
    }
  }
  return false;
}

// Compte les cases libres
function freeCount(used) {
  let n = 0;
  for (let r=0;r<used.length;r++) for (let c=0;c<used[r].length;c++) if(!used[r][c]) n++;
  return n;
}

// Cellules libres en ordre lecture
function freeCells(used) {
  const cells = [];
  for (let r=0;r<used.length;r++) for (let c=0;c<used[r].length;c++) if(!used[r][c]) cells.push([r,c]);
  return cells;
}

// Choisit un mot secret dont la longueur ≤ cases libres disponibles
function pickSecret(freeN) {
  const keys = Object.keys(SECRETS).map(Number).sort((a,b)=>a-b);
  // Prendre la clé la plus grande qui soit ≤ freeN
  let best = null;
  for (const k of keys) if (k <= freeN) best = k;
  if (!best) return null;
  return choice(SECRETS[best]);
}

function generateGame(depth=0) {
  if (depth > 200) return null;

  const grid = makeGrid(GRID_SIZE);
  const used = makeUsed(GRID_SIZE);

  const themeName = choice(Object.keys(THEMES));
  // Filtrer : mot ≤ GRID_SIZE lettres, trier du plus long au plus court
  const pool = shuffle(THEMES[themeName])
    .filter(w => w.length >= 3 && w.length <= GRID_SIZE)
    .sort((a,b) => b.length - a.length); // les longs d'abord, plus faciles à placer

  const words = [];
  let placed  = 0;

  // Phase 1 : placer des mots jusqu'à ce que les cases restantes
  // correspondent à un mot secret disponible
  for (const w of pool) {
    // Simuler : si on place ce mot, combien de cases libres restera-t-il ?
    const free = freeCount(used);
    // On veut que (free - w.length) soit soit encore couvrable par d'autres mots + secret,
    // soit exactement la bonne taille pour le secret.
    // Stratégie simple : on place tant qu'on a de la place
    if (free < w.length) continue; // ne rentre pas
    if (tryPlace(grid, used, w)) {
      words.push(w);
      placed += w.length;
    }
    // Vérifier si les cases restantes peuvent former un secret
    const remaining = freeCount(used);
    if (remaining > 0 && remaining <= 12 && pickSecret(remaining) !== null) {
      // On a un bon nombre de cases libres pour le secret → on arrête
      break;
    }
  }

  if (words.length < 5) return generateGame(depth+1);

  // Phase 2 : remplir les cases libres restantes avec le mot secret
  const remaining = freeCount(used);
  if (remaining === 0) return generateGame(depth+1); // pas de place pour le secret

  const secret = pickSecret(remaining);
  if (!secret) return generateGame(depth+1);

  // Placer les lettres du secret dans les cases libres (en ordre lecture)
  const cells = freeCells(used);
  // On utilise les `secret.length` premières cases libres pour le mot secret
  // Les cases libres restantes (s'il y en a) seront remplies avec les lettres restantes du secret répétées
  // → En pratique on choisit un secret dont la longueur ≤ remaining
  for (let i = 0; i < cells.length; i++) {
    const [r,c] = cells[i];
    grid[r][c] = secret[i % secret.length]; // cycle si plus de cases que de lettres
  }
  // Note : idéalement remaining === secret.length, mais si remaining > secret.length
  // les cases excédentaires reçoivent des lettres du secret en cycle (toujours du "vrai" contenu)

  return { grid, words, hiddenWord: secret, theme: themeName };
}

// ═══════════════════════════════════════════
//  CANVAS
// ═══════════════════════════════════════════
const canvas = document.getElementById("grid-canvas");
const ctx    = canvas.getContext("2d");

let game       = null;
let foundWords = new Set();
let foundCells = makeUsed(GRID_SIZE);
let selCells   = [];
let dragging   = false;

function initCanvas() {
  const size = CELL * GRID_SIZE;
  canvas.width = canvas.height = size;
  document.getElementById("grid-wrap").style.width = size + "px";
}

function drawGrid() {
  if (!game) return;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (let r=0; r<GRID_SIZE; r++) {
    for (let c=0; c<GRID_SIZE; c++) {
      const x = c*CELL, y = r*CELL;
      const isSel   = selCells.some(s=>s.r===r&&s.c===c);
      const isFound = foundCells[r][c];

      ctx.fillStyle = isSel ? "#cde4ff" : isFound ? "#b5f5b5" : "#ffffff";
      ctx.beginPath();
      ctx.roundRect(x+1, y+1, CELL-2, CELL-2, 3);
      ctx.fill();

      ctx.strokeStyle = isSel ? "#4a90e2" : isFound ? "#3c9c3c" : "#cccccc";
      ctx.lineWidth = (isSel||isFound) ? 1.5 : 0.8;
      ctx.stroke();

      ctx.fillStyle = isFound ? "#104010" : "#222";
      ctx.font = `bold ${Math.round(CELL*0.48)}px system-ui`;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(game.grid[r][c], x+CELL/2, y+CELL/2);
    }
  }
}

// ═══════════════════════════════════════════
//  SÉLECTION (par calcul de coordonnées)
// ═══════════════════════════════════════════
function pointToCell(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  const sx = canvas.width  / rect.width;
  const sy = canvas.height / rect.height;
  const x  = (clientX - rect.left) * sx;
  const y  = (clientY - rect.top)  * sy;
  const c  = Math.floor(x / CELL);
  const r  = Math.floor(y / CELL);
  if (r<0||r>=GRID_SIZE||c<0||c>=GRID_SIZE) return null;
  return {r, c};
}

function buildLine(from, to) {
  // Construit la liste de cellules en ligne droite de `from` à `to`
  const dr = to.r - from.r, dc = to.c - from.c;
  const adR = Math.abs(dr), adC = Math.abs(dc);
  // Doit être horizontal, vertical ou diagonal 45°
  if (adR !== 0 && adC !== 0 && adR !== adC) return null;
  const steps = Math.max(adR, adC);
  const sDr = Math.sign(dr), sDc = Math.sign(dc);
  const cells = [];
  for (let i=0; i<=steps; i++) cells.push({r: from.r+sDr*i, c: from.c+sDc*i});
  return cells;
}

function onStart(cx, cy) {
  const cell = pointToCell(cx, cy);
  if (!cell) return;
  dragging = true;
  selCells = [cell];
  drawGrid();
}

function onMove(cx, cy) {
  if (!dragging || !selCells.length) return;
  const cell = pointToCell(cx, cy);
  if (!cell) return;
  const line = buildLine(selCells[0], cell);
  if (!line) return;
  selCells = line;
  drawGrid();
}

function onEnd() {
  if (!dragging) return;
  dragging = false;
  if (selCells.length > 1) {
    const word    = selCells.map(s=>game.grid[s.r][s.c]).join("");
    const wordRev = word.split("").reverse().join("");
    const match   = game.words.find(w=>w===word||w===wordRev);
    if (match && !foundWords.has(match)) {
      foundWords.add(match);
      selCells.forEach(s=>{ foundCells[s.r][s.c]=true; });
      markWordFound(match);
      updateScore();
      if (foundWords.size === game.words.length) {
        setTimeout(()=>{
          document.getElementById("hidden-word").textContent = "🎉 Mot caché : "+game.hiddenWord;
        }, 200);
      }
    }
  }
  selCells = [];
  drawGrid();
}

// Touch
canvas.addEventListener("touchstart",  e=>{ e.preventDefault(); onStart(e.touches[0].clientX, e.touches[0].clientY); }, {passive:false});
canvas.addEventListener("touchmove",   e=>{ e.preventDefault(); onMove(e.touches[0].clientX,  e.touches[0].clientY); }, {passive:false});
canvas.addEventListener("touchend",    e=>{ e.preventDefault(); onEnd(); }, {passive:false});
canvas.addEventListener("touchcancel", e=>{ e.preventDefault(); selCells=[]; dragging=false; drawGrid(); }, {passive:false});

// Souris
canvas.addEventListener("pointerdown", e=>{ if(e.pointerType==="touch")return; onStart(e.clientX,e.clientY); });
canvas.addEventListener("pointermove", e=>{ if(e.pointerType==="touch")return; onMove(e.clientX,e.clientY); });
window.addEventListener("pointerup",   e=>{ if(e.pointerType==="touch")return; onEnd(); });

// ═══════════════════════════════════════════
//  UI
// ═══════════════════════════════════════════
function renderWordList(words) {
  const el = document.getElementById("word-list");
  el.innerHTML = "";
  [...words].sort().forEach(w=>{
    const s = document.createElement("span");
    s.className = "word-item";
    s.textContent = w;
    s.dataset.word = w;
    el.appendChild(s);
  });
}

function markWordFound(word) {
  document.querySelectorAll(".word-item").forEach(el=>{
    if (el.dataset.word===word) el.classList.add("found");
  });
}

function updateScore() {
  document.getElementById("score").textContent =
    `${foundWords.size} / ${game.words.length} mots trouvés`;
}

// ═══════════════════════════════════════════
//  NOUVELLE PARTIE
// ═══════════════════════════════════════════
function newGame() {
  document.getElementById("hidden-word").textContent = "";
  foundWords = new Set();
  foundCells = makeUsed(GRID_SIZE);
  selCells   = [];
  dragging   = false;
  game = generateGame();
  if (!game) { setTimeout(newGame, 50); return; }
  document.getElementById("theme-label").textContent = "Thème : "+game.theme;
  renderWordList(game.words);
  updateScore();
  drawGrid();
}

document.getElementById("new-game").addEventListener("click", newGame);
initCanvas();
newGame();
</script>

<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("service-worker.js");
  }
</script>
</body>
</html>
